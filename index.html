<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg-body:#F5F6FA;--bg-card:#fff;--bg-surface:#F5F6FA;--bg-hover:#F3F4F6;--bg-input:#fff;--text-primary:#1F2937;--text-secondary:#6B7280;--text-tertiary:#9CA3AF;--text-hint:#D1D5DB;--border:#EBECEF;--border-light:#F3F4F6;--border-hover:#D1D5DB;--accent:#487FFF;--accent-hover:#3B6EE6;--accent-bg:rgba(72,127,255,.1);--shadow:rgba(0,0,0,.04);--overlay:rgba(17,24,39,.5);--skeleton-1:#F3F4F6;--skeleton-2:#E5E7EB;--scroll-track:#f1f1f1;--scroll-thumb:#D1D5DB}
[data-theme="dark"]{--bg-body:#0F172A;--bg-card:#1E293B;--bg-surface:#1E293B;--bg-hover:#334155;--bg-input:#0F172A;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-tertiary:#64748B;--text-hint:#475569;--border:#334155;--border-light:#1E293B;--border-hover:#475569;--accent:#60A5FA;--accent-hover:#3B82F6;--accent-bg:rgba(96,165,250,.15);--shadow:rgba(0,0,0,.3);--overlay:rgba(0,0,0,.7);--skeleton-1:#1E293B;--skeleton-2:#334155;--scroll-track:#1E293B;--scroll-thumb:#475569}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg-body);color:var(--text-primary);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--scroll-track)}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

/* ── Toast Notifications ── */
.toast-container{position:fixed;top:72px;right:24px;z-index:1200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.12);max-width:380px;font-family:inherit}
.toast-success{background:#45B369;color:#fff}
.toast-error{background:#EF4A00;color:#fff}
.toast-warning{background:#FF9F29;color:#fff}
.toast-info{background:#487FFF;color:#fff}
.toast-exit{animation:toastOut .3s ease forwards}

/* ── Skeleton Loading ── */
.skeleton{background:linear-gradient(90deg,var(--skeleton-1) 25%,var(--skeleton-2) 50%,var(--skeleton-1) 75%);background-size:400px 100%;animation:shimmer 1.5s ease infinite;border-radius:6px}
.skeleton-text{height:14px;margin-bottom:8px;width:100%}
.skeleton-title{height:20px;margin-bottom:12px;width:60%}
.skeleton-card{height:120px;border-radius:8px;margin-bottom:12px}
.skeleton-circle{border-radius:50%}

/* ── Session Timeout ── */
.timeout-overlay{position:fixed;inset:0;background:var(--overlay);z-index:1300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.timeout-modal{background:var(--bg-card);border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px var(--shadow);animation:modalIn .2s ease}

/* ── Sidebar ── */
.sidebar{width:250px;height:100vh;position:fixed;top:0;left:0;background:var(--bg-card);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar-logo{padding:20px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);text-decoration:none}
.sidebar-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#487FFF,#6E9FFF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.sidebar-logo-text{font-size:16px;font-weight:700;color:var(--text-primary)}
.sidebar-logo-sub{font-size:10px;color:var(--text-tertiary);font-weight:500;margin-top:1px}
.sidebar-menu{padding:16px 12px;flex:1;overflow-y:auto;list-style:none}
.sidebar-item{margin-bottom:2px}
.sidebar-item a,.sidebar-item button{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .15s;text-decoration:none;background:none;border:none;width:100%;font-family:inherit}
.sidebar-item a:hover,.sidebar-item button:hover{background:var(--bg-surface);color:var(--accent)}
.sidebar-item.active a,.sidebar-item.active button{background:var(--accent-bg);color:var(--accent);font-weight:600}
.sidebar-divider{font-size:10px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1.5px;padding:16px 14px 6px;margin-top:8px}

/* ── Top Navbar ── */
.navbar{height:64px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.navbar-search{position:relative;flex:1;max-width:320px}
.navbar-search input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg-surface);color:var(--text-primary);transition:border-color .2s}
.navbar-search input:focus{border-color:var(--accent);background:var(--bg-card)}
.navbar-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:16px}
.navbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:18px;transition:all .15s}
.icon-btn:hover{background:var(--bg-hover);color:var(--accent)}
.user-badge{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border-radius:50px;cursor:pointer;transition:background .15s}
.user-badge:hover{background:var(--bg-surface)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#487FFF,#6E9FFF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}

/* ── Main Content ── */
.dashboard-main{margin-left:250px;min-height:100vh;transition:margin-left .3s}
.dashboard-main-body{padding:24px}

/* ── Cards ── */
.card{background:var(--bg-card);border-radius:8px;border:1px solid var(--border);box-shadow:none}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}
.card-title{font-size:16px;font-weight:600;color:var(--text-primary)}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:rgba(239,74,0,.1);color:#EF4A00}.btn-success{background:rgba(69,179,105,.1);color:#45B369}.btn-warn{background:rgba(255,159,41,.1);color:#FF9F29}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-secondary)}.btn-ghost:hover{background:var(--bg-surface);border-color:var(--border-hover)}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
table th{text-align:left;padding:10px 12px;font-weight:600;color:var(--text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg-surface)}
table td{padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:13px}
table tr:hover{background:var(--bg-surface)}

/* ── Tabs ── */
.tab-btn{padding:12px 18px;font-size:13px;background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:-2px;transition:all .15s;border-bottom:3px solid transparent;white-space:nowrap;color:var(--text-secondary);font-weight:500}
.tab-btn:hover{color:var(--accent)}.tab-active{font-weight:600;color:var(--accent)!important;border-bottom-color:var(--accent)!important}.tab-inactive{color:var(--text-secondary)}

/* ── Forms ── */
.input{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;width:100%;outline:none;transition:all .15s;background:var(--bg-input);color:var(--text-primary)}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(72,127,255,.1)}
.select{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:var(--bg-input);cursor:pointer;width:100%;color:var(--text-primary)}
.select:focus{border-color:var(--accent)}
.label{font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:4px}

/* ── Modals ── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--bg-card);border-radius:12px;padding:24px;max-width:520px;width:90%;box-shadow:0 20px 60px var(--shadow);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}

/* ── Utility ── */
.edit-icon{width:28px;height:28px;border-radius:6px;background:rgba(72,127,255,.1);color:#487FFF;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.edit-icon:hover{background:rgba(72,127,255,.2)}
.del-icon{width:24px;height:24px;border-radius:6px;background:rgba(239,74,0,.1);color:#EF4A00;border:none;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.del-icon:hover{background:rgba(239,74,0,.2)}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.project-card{background:var(--bg-card);border-radius:8px;border:1px solid var(--border);padding:20px;cursor:pointer;transition:all .2s;box-shadow:0 1px 2px var(--shadow)}.project-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(72,127,255,.12);transform:translateY(-2px)}
.subtask-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:2px;transition:background .15s}
.subtask-row:hover{background:var(--bg-surface)}.subtask-row.done{background:rgba(69,179,105,.06)}
.expand-btn{width:100%;display:flex;align-items:center;gap:14px;padding:16px 20px;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left}.expand-btn:hover{background:var(--bg-surface)}
input[type="checkbox"]{width:18px;height:18px;accent-color:#487FFF;cursor:pointer;margin-top:1px;flex-shrink:0}
input[type="checkbox"]:disabled{cursor:default;opacity:.6}

/* ── KPI Gradient Cards (WowDash style) ── */
.kpi-card{border-radius:8px;padding:16px 20px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi-card::after{content:none}
.kpi-1,.kpi-2,.kpi-3,.kpi-4,.kpi-5{background:var(--bg-card)}

/* ── Notification Bell ── */
.notif-bell{position:relative;cursor:pointer}.notif-bell:hover .icon-btn{background:var(--bg-hover);color:#487FFF}
.notif-badge{position:absolute;top:0;right:0;background:#EF4A00;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notif-dropdown{position:absolute;top:48px;right:-20px;width:360px;max-height:420px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.12);z-index:200;animation:modalIn .2s ease}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .15s}.notif-item:hover{background:var(--bg-surface)}
.notif-item.unread{background:#F0F7FF;border-left:3px solid #487FFF}
.notif-empty{padding:32px 16px;text-align:center;color:#9CA3AF;font-size:13px}

/* ── Photo Upload ── */
.photo-upload{width:80px;height:80px;border-radius:50%;border:2px dashed #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .15s;flex-shrink:0}
.photo-upload:hover{border-color:#487FFF}.photo-upload img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── Directory ── */
.dir-link{color:#487FFF;text-decoration:none;font-weight:500;font-size:12px}.dir-link:hover{text-decoration:underline}

/* ── Cascade loading ── */
.cascade-loading{font-size:11px;color:#9CA3AF;padding:8px 0}

/* ── Gantt dependency ── */
.gantt-dep-label{font-size:9px;color:#9CA3AF;display:block;margin-top:1px}

/* ── Mobile ── */
.sidebar-mobile-toggle{display:none}
.mobile-overlay{display:none}

/* ── Global Search ── */
.search-overlay{position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:1100;display:flex;align-items:flex-start;justify-content:center;padding-top:min(15vh,120px);backdrop-filter:blur(4px);animation:fadeIn .15s ease}
.search-box{width:90%;max-width:600px;background:var(--bg-card);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;animation:modalIn .2s ease}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border)}
.search-input-wrap input{flex:1;border:none;outline:none;font-size:16px;font-family:inherit;background:none;color:#1F2937}
.search-input-wrap input::placeholder{color:#D1D5DB}
.search-kbd{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;background:var(--bg-hover);color:var(--text-tertiary);border:1px solid var(--border)}
.search-results{max-height:420px;overflow-y:auto;padding:8px}
.search-cat{padding:6px 16px;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;cursor:pointer;transition:background .1s}
.search-item:hover,.search-item.active{background:var(--bg-surface)}
.search-item-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.search-item-text{flex:1;min-width:0}
.search-item-title{font-size:13px;font-weight:600;color:#1F2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item-sub{font-size:11px;color:#9CA3AF;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;flex-shrink:0}
.search-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:16px;font-size:11px;color:#9CA3AF}
.search-footer span{display:flex;align-items:center;gap:4px}
.search-empty{padding:40px 16px;text-align:center;color:#9CA3AF;font-size:13px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .sidebar-mobile-toggle{display:flex}
  .dashboard-main{margin-left:0}
  .dashboard-main-body{padding:14px}
  .navbar{padding:0 14px}
  .navbar-search{max-width:none}
  .notif-dropdown{width:calc(100vw - 40px);right:-80px}
  .modal{width:95%!important;padding:20px!important;max-height:85vh!important}
  .tab-btn{padding:10px 10px!important;font-size:12px!important}
  table{font-size:11px!important}
  table th,table td{padding:6px 5px!important}
}
@media print{.sidebar,.navbar,.btn,.edit-icon,.del-icon,.tab-btn,nav,.no-print{display:none!important}.dashboard-main{margin-left:0!important}.dashboard-main-body{padding:8px!important}.card{break-inside:avoid;border:1px solid #eee!important;box-shadow:none!important}body{background:#fff!important;font-size:11px!important;color:#1F2937!important}.overlay{display:none!important}table{page-break-inside:auto}tr{page-break-inside:avoid}thead{display:table-header-group}h3{page-break-after:avoid}@page{margin:12mm 10mm;size:A4 landscape}.print-section{page-break-before:auto}svg{max-width:100%!important}}
</style>

function ExternalCheckpointView(p){

  var project5M=data.project5M;

  // Milestones from tasks

    var prog=Number(pr.actualPct)||0;
    var progS=prog>=80?100:prog>=60?80:prog>=40?60:prog>=20?40:20;
    return{schedule:schedS,budget:budS,risk:riskS,progress:progS,overall:Math.round((schedS*0.3+budS*0.25+riskS*0.25+progS*0.2))}
