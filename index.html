<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SCCI OneHub — Project Management</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231B2A4A'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='14' font-weight='bold'>PM</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#F5F6FA;color:#1F2937;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#9CA3AF}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}

/* ── Sidebar ── */
.sidebar{width:250px;height:100vh;position:fixed;top:0;left:0;background:#fff;border-right:1px solid #EBECEF;z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sidebar-logo{padding:20px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #EBECEF;text-decoration:none}
.sidebar-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#487FFF,#6E9FFF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.sidebar-logo-text{font-size:16px;font-weight:700;color:#1F2937}
.sidebar-logo-sub{font-size:10px;color:#9CA3AF;font-weight:500;margin-top:1px}
.sidebar-menu{padding:16px 12px;flex:1;overflow-y:auto;list-style:none}
.sidebar-item{margin-bottom:2px}
.sidebar-item a,.sidebar-item button{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#6B7280;cursor:pointer;transition:all .15s;text-decoration:none;background:none;border:none;width:100%;font-family:inherit}
.sidebar-item a:hover,.sidebar-item button:hover{background:#F5F6FA;color:#487FFF}
.sidebar-item.active a,.sidebar-item.active button{background:rgba(72,127,255,.1);color:#487FFF;font-weight:600}
.sidebar-divider{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1.5px;padding:16px 14px 6px;margin-top:8px}

/* ── Top Navbar ── */
.navbar{height:64px;background:#fff;border-bottom:1px solid #EBECEF;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.navbar-search{position:relative;flex:1;max-width:320px}
.navbar-search input{width:100%;padding:8px 12px 8px 36px;border:1px solid #EBECEF;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#F5F6FA;transition:border-color .2s}
.navbar-search input:focus{border-color:#487FFF;background:#fff}
.navbar-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:16px}
.navbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:40px;height:40px;border-radius:50%;background:#F5F6FA;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6B7280;font-size:18px;transition:all .15s}
.icon-btn:hover{background:#EBECEF;color:#487FFF}
.user-badge{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border-radius:50px;cursor:pointer;transition:background .15s}
.user-badge:hover{background:#F5F6FA}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#487FFF,#6E9FFF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}

/* ── Main Content ── */
.dashboard-main{margin-left:250px;min-height:100vh;transition:margin-left .3s}
.dashboard-main-body{padding:24px}

/* ── Cards ── */
.card{background:#fff;border-radius:8px;border:1px solid #EBECEF;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card-header{padding:16px 20px;border-bottom:1px solid #EBECEF;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px}
.card-title{font-size:16px;font-weight:600;color:#1F2937}

/* ── Buttons ── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary{background:#487FFF;color:#fff}.btn-primary:hover{background:#3B6EE6}
.btn-danger{background:rgba(239,74,0,.1);color:#EF4A00}.btn-success{background:rgba(69,179,105,.1);color:#45B369}.btn-warn{background:rgba(255,159,41,.1);color:#FF9F29}
.btn-ghost{background:none;border:1px solid #EBECEF;color:#6B7280}.btn-ghost:hover{background:#F5F6FA;border-color:#D1D5DB}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
table th{text-align:left;padding:10px 12px;font-weight:600;color:#6B7280;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #EBECEF;background:#F5F6FA}
table td{padding:10px 12px;border-bottom:1px solid #F3F4F6;font-size:13px}
table tr:hover{background:#F5F6FA}

/* ── Tabs ── */
.tab-btn{padding:12px 18px;font-size:13px;background:none;border:none;cursor:pointer;font-family:inherit;margin-bottom:-2px;transition:all .15s;border-bottom:3px solid transparent;white-space:nowrap;color:#6B7280;font-weight:500}
.tab-btn:hover{color:#487FFF}.tab-active{font-weight:600;color:#487FFF!important;border-bottom-color:#487FFF!important}.tab-inactive{color:#6B7280}

/* ── Forms ── */
.input{padding:8px 14px;border:1px solid #EBECEF;border-radius:8px;font-family:inherit;font-size:13px;width:100%;outline:none;transition:all .15s;background:#fff;color:#1F2937}
.input:focus{border-color:#487FFF;box-shadow:0 0 0 3px rgba(72,127,255,.1)}
.select{padding:8px 14px;border:1px solid #EBECEF;border-radius:8px;font-family:inherit;font-size:13px;outline:none;background:#fff;cursor:pointer;width:100%;color:#1F2937}
.select:focus{border-color:#487FFF}
.label{font-size:12px;font-weight:600;color:#6B7280;display:block;margin-bottom:4px}

/* ── Modals ── */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(17,24,39,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:520px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}

/* ── Utility ── */
.edit-icon{width:28px;height:28px;border-radius:6px;background:rgba(72,127,255,.1);color:#487FFF;border:none;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.edit-icon:hover{background:rgba(72,127,255,.2)}
.del-icon{width:24px;height:24px;border-radius:6px;background:rgba(239,74,0,.1);color:#EF4A00;border:none;cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}.del-icon:hover{background:rgba(239,74,0,.2)}
.spinner{width:24px;height:24px;border:3px solid #EBECEF;border-top-color:#487FFF;border-radius:50%;animation:spin .7s linear infinite}
.project-card{background:#fff;border-radius:8px;border:1px solid #EBECEF;padding:20px;cursor:pointer;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.04)}.project-card:hover{border-color:#487FFF;box-shadow:0 4px 16px rgba(72,127,255,.12);transform:translateY(-2px)}
.subtask-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:2px;transition:background .15s}
.subtask-row:hover{background:#F5F6FA}.subtask-row.done{background:rgba(69,179,105,.06)}
.expand-btn{width:100%;display:flex;align-items:center;gap:14px;padding:16px 20px;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left}.expand-btn:hover{background:#F5F6FA}
input[type="checkbox"]{width:18px;height:18px;accent-color:#487FFF;cursor:pointer;margin-top:1px;flex-shrink:0}
input[type="checkbox"]:disabled{cursor:default;opacity:.6}

/* ── KPI Gradient Cards (WowDash style) ── */
.kpi-card{border-radius:8px;padding:16px 20px;border:1px solid #EBECEF;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 0 0 80px;opacity:.1}
.kpi-1{background:linear-gradient(135deg,#fff,#EBF2FF)}.kpi-1::after{background:#487FFF}
.kpi-2{background:linear-gradient(135deg,#fff,#E8FAF0)}.kpi-2::after{background:#45B369}
.kpi-3{background:linear-gradient(135deg,#fff,#FFF4E5)}.kpi-3::after{background:#FF9F29}
.kpi-4{background:linear-gradient(135deg,#fff,#FFF0E8)}.kpi-4::after{background:#EF4A00}
.kpi-5{background:linear-gradient(135deg,#fff,#F3EEFF)}.kpi-5::after{background:#8B5CF6}

/* ── Notification Bell ── */
.notif-bell{position:relative;cursor:pointer}.notif-bell:hover .icon-btn{background:#EBECEF;color:#487FFF}
.notif-badge{position:absolute;top:0;right:0;background:#EF4A00;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notif-dropdown{position:absolute;top:48px;right:-20px;width:360px;max-height:420px;overflow-y:auto;background:#fff;border:1px solid #EBECEF;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.12);z-index:200;animation:modalIn .2s ease}
.notif-item{padding:12px 16px;border-bottom:1px solid #F5F6FA;cursor:pointer;transition:background .15s}.notif-item:hover{background:#F5F6FA}
.notif-item.unread{background:#F0F7FF;border-left:3px solid #487FFF}
.notif-empty{padding:32px 16px;text-align:center;color:#9CA3AF;font-size:13px}

/* ── Photo Upload ── */
.photo-upload{width:80px;height:80px;border-radius:50%;border:2px dashed #D1D5DB;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .15s;flex-shrink:0}
.photo-upload:hover{border-color:#487FFF}.photo-upload img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── Directory ── */
.dir-link{color:#487FFF;text-decoration:none;font-weight:500;font-size:12px}.dir-link:hover{text-decoration:underline}

/* ── Cascade loading ── */
.cascade-loading{font-size:11px;color:#9CA3AF;padding:8px 0}

/* ── Gantt dependency ── */
.gantt-dep-label{font-size:9px;color:#9CA3AF;display:block;margin-top:1px}

/* ── Mobile ── */
.sidebar-mobile-toggle{display:none}
.mobile-overlay{display:none}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .sidebar-mobile-toggle{display:flex}
  .dashboard-main{margin-left:0}
  .dashboard-main-body{padding:14px}
  .navbar{padding:0 14px}
  .navbar-search{max-width:none}
  .notif-dropdown{width:calc(100vw - 40px);right:-80px}
  .modal{width:95%!important;padding:20px!important;max-height:85vh!important}
  .tab-btn{padding:10px 10px!important;font-size:12px!important}
  table{font-size:11px!important}
  table th,table td{padding:6px 5px!important}
}
@media print{.sidebar,.navbar,.btn,.edit-icon,.del-icon,.tab-btn,nav{display:none!important}.dashboard-main{margin-left:0!important}.dashboard-main-body{padding:8px!important}.card{break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important}body{background:#fff!important;font-size:11px!important}.overlay{display:none!important}}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<body>
<div id="root"></div>
<script>
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo,useCallback=React.useCallback,useRef=React.useRef;
var mono="'JetBrains Mono','Fira Code',monospace",MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function roleLabel(r){return{admin:"Administrator",project_admin:"Project Admin",pmo:"PMO Officer",project_owner:"Project Owner",bod:"Board of Directors",external:"External"}[r]||r}
function getInitials(name){if(!name)return"U";var parts=name.trim().split(/\s+/);if(parts.length>=2)return(parts[0].charAt(0)+parts[parts.length-1].charAt(0)).toUpperCase();return parts[0].charAt(0).toUpperCase()}
function Avatar(p){var sz=p.size||36,fs=p.fontSize||13,photo=p.photo,initials=getInitials(p.name);
  if(photo)return e("div",{style:{width:sz,height:sz,borderRadius:"50%",overflow:"hidden",flexShrink:0}},e("img",{src:photo,style:{width:"100%",height:"100%",objectFit:"cover"}}));
  return e("div",{className:p.className||"",style:Object.assign({width:sz,height:sz,borderRadius:"50%",background:"linear-gradient(135deg,#487FFF,#6E9FFF)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:fs,color:"#fff",flexShrink:0},p.style||{})},initials)}

// ── Mobile responsive helpers ──
function useMobile(){var _w=useState(window.innerWidth<768);useEffect(function(){function h(){_w[1](window.innerWidth<768)}window.addEventListener("resize",h);return function(){window.removeEventListener("resize",h)}},[]);return _w[0]}
function rg(cols,mob){return mob?"1fr":cols} // responsive grid columns
var API_KEY="scci-onehub-api-url";
var DEFAULT_API_URL="https://script.google.com/macros/s/AKfycbx8IOahDKlJgEwEVCbd5jsk1YF1M6OgGUVe6gPNidFQtI7ejaAxXEw_tSNuZkEHp1bHdA/exec";

// ── API Layer ──
function getApiUrl(){return localStorage.getItem(API_KEY)||DEFAULT_API_URL}
function setApiUrl(u){localStorage.setItem(API_KEY,u)}
function apiGet(action,params){
  var url=getApiUrl()+"?action="+action;
  if(params)Object.keys(params).forEach(function(k){url+="&"+k+"="+encodeURIComponent(params[k])});
  return fetch(url).then(function(r){return r.json()})
}
function apiPost(action,data,id){
  var ctx=window._userCtx||{};
  var payload=JSON.stringify({action:action,data:data,id:id,_role:ctx.role||"",_userName:ctx.name||""});
  return fetch(getApiUrl(),{method:"POST",body:payload}).then(function(r){return r.json()}).then(function(d){
    if(d.message&&d.message.indexOf("API")>=0&&action!=="ping"){
      return fetch(getApiUrl()+"?action=proxy&payload="+encodeURIComponent(payload)).then(function(r){return r.json()})
    }
    return d
  }).catch(function(){
    return fetch(getApiUrl()+"?action=proxy&payload="+encodeURIComponent(payload)).then(function(r){return r.json()})
  })
}

// ── Helpers ──
function fmt(d){if(!d||typeof d!=="string")return"";var m=String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return"";try{var dt=new Date(d+"T00:00:00");return isNaN(dt.getTime())?"":dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}catch(e){return""}}
// Number formatting for budget inputs
function fmtNum(n){if(!n&&n!==0)return"";return Number(String(n).replace(/[^0-9.-]/g,"")).toLocaleString("id-ID")}
function parseNum(s){return Number(String(s).replace(/[^0-9.-]/g,""))||0}
function fmtF(d){if(!d||typeof d!=="string")return"";var m=String(d).match(/^(\d{4})-(\d{2})-(\d{2})/);if(!m)return"";try{var dt=new Date(d+"T00:00:00");return isNaN(dt.getTime())?"":dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}catch(e){return""}}
function pct(n){return Math.round(n*1000)/10}
function sc(s){var sl=(s||"").toLowerCase();return sl==="done"?"#45B369":sl==="in progress"?"#FF9F29":sl==="pending review"?"#8B5CF6":"#9CA3AF"}
function rc(l){return l==="HIGH"?"#EF4A00":l==="MEDIUM"?"#FF9F29":"#45B369"}
function rbg(l){return l==="HIGH"?"rgba(239,74,0,.1)":l==="MEDIUM"?"rgba(255,159,41,.08)":"rgba(69,179,105,.06)"}
function tprog(t){var s=(t.taskStatus||"Not Started").toLowerCase();return s==="done"?100:s==="in progress"?50:0}
function getCM(){var n=new Date();return n.getMonth()}
function compRS(risks){var s={HIGH:10,MEDIUM:5,LOW:2},o=risks.filter(function(r){return r.status==="Open"}),t=o.reduce(function(a,r){return a+(s[r.level]||0)},0),m=risks.reduce(function(a,r){return a+(s[r.level]||0)},0);return{score:t,max:m,pct:m>0?Math.round(t/m*100):0}}
function getRL(p){if(p>=70)return{level:"CRITICAL",color:"#C43902",emoji:"\uD83D\uDD34"};if(p>=40)return{level:"HIGH",color:"#FF9F29",emoji:"\uD83D\uDFE1"};if(p>=15)return{level:"MODERATE",color:"#487FFF",emoji:"\uD83D\uDD35"};return{level:"LOW",color:"#45B369",emoji:"\uD83D\uDFE2"}}
var plannedCurve=[0,2,5,12,22,35,50,65,78,88,95,100]; // fallback only

// ── Generic Components ──
function Modal(p){if(!p.show)return null;return e("div",{className:"overlay",onClick:function(ev){if(ev.target===ev.currentTarget)p.onClose()}},e("div",{className:"modal",style:p.style||{}},p.children))}
function Spinner(){return e("div",{style:{display:"flex",justifyContent:"center",padding:40}},e("div",{className:"spinner"}))}
function Badge(p){return e("span",{style:{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:50,background:p.bg||"#F3F4F6",color:p.color||"#6B7280",letterSpacing:.2,lineHeight:1.2,display:"inline-block"}},p.children)}
